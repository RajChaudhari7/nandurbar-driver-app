name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Auto-Generate Perfect Configuration Files
        run: |
          mkdir -p www
          echo "<html><body>Loading Dashboard...</body></html>" > www/index.html
          
          echo '{
            "name": "nandurbar-driver",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/core": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }' > package.json
          
          echo '{
            "appId": "com.nandurbarbazar.driver",
            "appName": "Nandurbar Driver",
            "webDir": "www",
            "server": {
              "url": "https://gocart-delta.vercel.app/driver",
              "cleartext": true
            }
          }' > capacitor.config.json

      - name: Install Dependencies
        run: npm install

      - name: Create Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Compile Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: nandurbar-driver-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
