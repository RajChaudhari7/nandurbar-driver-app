name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Safe Web Folder
        run: |
          mkdir -p www
          echo "<html><head><title>Loading...</title></head><body style='background:#000;'></body></html>" > www/index.html

      - name: Force Install Capacitor Dependencies
        run: npm install @capacitor/core@latest @capacitor/android@latest @capacitor/cli@latest

      - name: Create Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Compile Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: nandurbar-driver-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
